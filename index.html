<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrendFlash | 最新ニュースまとめ</title>
<meta name="description" content="中東情勢・AI・テクノロジー・経済・気候変動など最新ニュースを分かりやすく解説。TrendFlash公式サイト。">
<meta name="keywords" content="中東情勢, AI, 教育AI, テクノロジー, 世界経済, 気候変動, ニュース">
<meta name="robots" content="index, follow">

<meta property="og:title" content="TrendFlash | 最新ニュースまとめ">
<meta property="og:description" content="中東情勢・AI・経済など話題ニュースを分かりやすく解説">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trendflash.github.io/Trendflash8/">
<meta property="og:image" content="https://trendflash.github.io/Trendflash8/ogp.jpg">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
  <h1>TrendFlash</h1>
  <div class="date" id="currentDate"></div>
</div>

<div class="container" id="articles"></div>

<button id="downloadSitemap">sitemap.xml をダウンロード</button>

<script>
// 日付表示
function updateDate(){
  const now = new Date();
  const formatted =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日 " +
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0') + ":" +
    now.getSeconds().toString().padStart(2,'0');
  document.getElementById("currentDate").textContent = formatted;
}
updateDate();
setInterval(updateDate,1000);

// 記事リスト自動取得（1〜19）
const articleList = [];
for(let i=1;i<=19;i++){
  articleList.push(`articles/article${i}.html`);
}
articleList.reverse();

// 記事カード生成
const articlesDiv = document.getElementById("articles");
articleList.forEach(url=>{
  fetch(url)
    .then(res=>res.text())
    .then(data=>{
      const parser = new DOMParser();
      const doc = parser.parseFromString(data,"text/html");
      const title = doc.querySelector("h1") ? doc.querySelector("h1").innerText : "タイトル未取得";
      const content = doc.querySelector("p") ? doc.querySelector("p").innerText : "";
      let preview = content.slice(0,80) + (content.length>80 ? "..." : "");
      const currentUrl = window.location.origin + "/" + url;
      const card = document.createElement("div");
      card.className="article-card";
      card.innerHTML = `
        <h2><a href="${url}">${title}</a></h2>
        <p>${preview}</p>
        <div class="share">
          <a href="https://twitter.com/intent/tweet?text=${title}&url=${currentUrl}" target="_blank">Xで共有</a>
          <a href="https://www.facebook.com/sharer/sharer.php?u=${currentUrl}" target="_blank">Facebook</a>
        </div>
      `;
      articlesDiv.appendChild(card);
    });
});

// sitemap.xml 自動生成 + ダウンロード
document.getElementById("downloadSitemap").addEventListener("click",()=>{
  let sitemap = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;
  sitemap += `  <url>\n    <loc>https://trendflash.github.io/Trendflash8/</loc>\n    <priority>1.0</priority>\n  </url>\n`;
  articleList.forEach(url=>{
    sitemap += `  <url>\n    <loc>https://trendflash.github.io/Trendflash8/${url}</loc>\n    <priority>0.8</priority>\n  </url>\n`;
  });
  sitemap += `</urlset>`;
  const blob = new Blob([sitemap], {type:"application/xml"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "sitemap.xml";
  link.click();
});
</script>

</body>
</html>
