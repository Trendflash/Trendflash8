<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendFlash | 最新ニュース・国際情勢・経済情報</title>
<meta name="description" content="TrendFlashは国際情勢、経済、国内ニュースを分かりやすくまとめるニュースサイトです。最新情報を迅速かつ冷静にお届けします。">
<meta name="keywords" content="ニュース, 国際情勢, 経済ニュース, 日本ニュース, 中東情勢, 原油価格">
<meta name="robots" content="index, follow">

<style>
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:#f4f6f9;
  color:#111;
}
header{
  background:#1e2a38;
  color:white;
  padding:20px;
}
header h1{
  margin:0;
  font-size:26px;
}
nav{
  margin-top:10px;
}
nav button{
  background:none;
  border:none;
  color:white;
  margin-right:15px;
  font-size:14px;
  cursor:pointer;
}
nav button:hover{
  text-decoration:underline;
}
#todayDate{
  font-size:12px;
  opacity:0.8;
  margin-top:5px;
}
.container{
  max-width:950px;
  margin:30px auto;
  padding:0 20px;
}
.article-card{
  background:white;
  padding:20px;
  margin-bottom:18px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  cursor:pointer;
}
.article-card:hover{
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.meta{
  font-size:13px;
  color:#777;
  margin-bottom:8px;
}
.back{
  color:#1e2a38;
  cursor:pointer;
  margin-bottom:15px;
  display:inline-block;
}
footer{
  background:#e9edf3;
  text-align:center;
  padding:25px;
  margin-top:40px;
  font-size:13px;
  color:#555;
}
</style>
</head>
<body>

<header>
<h1>TrendFlash</h1>
<div id="todayDate"></div>
</header>

<div class="container" id="articlesContainer">
  <!-- 記事カードをここに挿入 -->
</div>

<footer>
© 2026 TrendFlash  
<br>本サイトは公開情報をもとに構成されています。
</footer>

<script>
const today = new Date();
document.getElementById("todayDate").innerText =
  "本日: " + today.getFullYear() + "年" + (today.getMonth()+1) + "月" + today.getDate() + "日";

// 記事情報
const articles = [
  {file:"article1.html", title:"イスラエルとイランの緊張再燃　中東情勢は新たな局面へ", category:"国際", date:"2026年3月3日"},
  {file:"article2.html", title:"中東情勢の緊張で原油価格が変動　家計への影響は", category:"経済", date:"2026年3月3日"},
  {file:"article3.html", title:"教育現場で広がるAI活用　学習スタイルはどう変わるか", category:"国内", date:"2026年3月3日"},
  {file:"article4.html", title:"最新テクノロジーが企業戦略に与える影響", category:"経済", date:"2026年3月3日"},
  {file:"article5.html", title:"国際的な気候変動対策の進展と課題", category:"国際", date:"2026年3月3日"},
  {file:"article6.html", title:"日本国内の交通インフラ改善の現状と今後", category:"国内", date:"2026年3月3日"}
];

const container = document.getElementById("articlesContainer");
articles.forEach(a=>{
  const div = document.createElement("div");
  div.className = "article-card";
  div.onclick = ()=>{ location.href="./articles/"+a.file; };
  div.innerHTML = `<div class="meta">${a.category} ｜ ${a.date}</div><h3>${a.title}</h3>`;
  container.appendChild(div);
});
</script>

</body>
</html>
