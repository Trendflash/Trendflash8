<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendFlash</title>

<style>
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:#f3f3f3;
  margin:0;
}

/* 黒ヘッダー */
.hero{
  background:#000;
  color:#fff;
  padding:45px 20px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:48px;
  letter-spacing:2px;
}

.date{
  margin-top:10px;
  font-size:18px;
  color:#ccc;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.article-card{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  transition:0.2s;
}

.article-card:hover{
  transform:translateY(-3px);
}

.article-card h2{
  margin-top:0;
}

.article-card a{
  text-decoration:none;
  color:#000;
}

.article-card p{
  color:#444;
}
</style>
</head>

<body>

<div class="hero">
  <h1>TrendFlash</h1>
  <div class="date" id="currentDate"></div>
</div>

<div class="container" id="articles"></div>

<script>
/* 日付・時刻（秒まで） */
function updateDate(){
  const now = new Date();
  const formatted =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日 " +
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0') + ":" +
    now.getSeconds().toString().padStart(2,'0');
  document.getElementById("currentDate").textContent = formatted;
}
updateDate();
setInterval(updateDate,1000);


/* 新しい順 */
const articleList = [
  "articles/article7.html",
  "articles/article6.html",
  "articles/article5.html",
  "articles/article4.html",
  "articles/article3.html",
  "articles/article2.html",
  "articles/article1.html"
];

/* 記事読み込み */
articleList.forEach(url=>{
  fetch(url)
  .then(res=>res.text())
  .then(data=>{
    const parser = new DOMParser();
    const doc = parser.parseFromString(data,"text/html");

    const title = doc.querySelector("h1")
      ? doc.querySelector("h1").innerText
      : "タイトル未取得";

    const content = doc.querySelector("p")
      ? doc.querySelector("p").innerText
      : "";

    /* 約80文字で自然に切る */
    let preview = content.slice(0,80);
    if(content.length > 80){
      preview += "...";
    }

    const card = document.createElement("div");
    card.className="article-card";
    card.innerHTML = `
      <h2><a href="${url}">${title}</a></h2>
      <p>${preview}</p>
    `;
    document.getElementById("articles").appendChild(card);
  });
});
</script>

</body>
</html>
