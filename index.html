<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrendFlash | 最新ニュースまとめ</title>

<meta name="description" content="中東情勢・AI・テクノロジー・経済・気候変動など最新ニュースを分かりやすく解説。TrendFlash公式サイト。">
<meta name="keywords" content="中東情勢, AI, 教育AI, テクノロジー, 世界経済, 気候変動, ニュース">
<meta name="robots" content="index, follow">

<!-- OGP -->
<meta property="og:title" content="TrendFlash | 最新ニュースまとめ">
<meta property="og:description" content="中東情勢・AI・経済など話題ニュースを分かりやすく解説">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trendflash.github.io/Trendflash8/">
<meta property="og:image" content="https://trendflash.github.io/Trendflash8/ogp.jpg">

<link rel="stylesheet" href="style.css">

<style>

/* ヒーローヘッダー */
.hero{
  background:#000;
  color:#fff;
  padding:45px 20px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:48px;
  letter-spacing:2px;
}

.date{
  margin-top:10px;
  font-size:18px;
  color:#ccc;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* 記事カード */
.article-card{
  background:#fff;
  padding:22px;
  margin-bottom:20px;
  border-radius:12px;
  transition:0.25s;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.article-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 26px rgba(0,0,0,0.12);
}

.article-card h2{
  margin-top:0;
  font-size:22px;
}

.article-card a{
  text-decoration:none;
  color:#111;
}

.article-card p{
  color:#444;
  margin-top:8px;
}

/* 共有 */
.share{
  margin-top:10px;
}

.share a{
  font-size:14px;
  margin-right:10px;
  text-decoration:none;
  color:#0078D7;
}

</style>
</head>

<body>

<div class="hero">
  <h1>TrendFlash</h1>
  <div class="date" id="currentDate"></div>
</div>

<div class="container" id="articles"></div>

<script>

/* 日付表示 */
function updateDate(){
  const now = new Date();
  const formatted =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日 " +
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0') + ":" +
    now.getSeconds().toString().padStart(2,'0');

  document.getElementById("currentDate").textContent = formatted;
}

updateDate();
setInterval(updateDate,1000);


/* 新しい順 */
const articleList = [
"articles/article19.html",
"articles/article18.html",
"articles/article17.html",
"articles/article16.html",
"articles/article15.html",
"articles/article14.html",
"articles/article13.html",
"articles/article12.html",
"articles/article11.html",
"articles/article10.html",
"articles/article9.html",
"articles/article8.html",
"articles/article7.html",
"articles/article6.html",
"articles/article5.html",
"articles/article4.html",
"articles/article3.html",
"articles/article2.html",
"articles/article1.html"
];


/* 記事読み込み */
async function loadArticles(){

for(const url of articleList){

try{

const res = await fetch(url);

if(!res.ok) continue;

const html = await res.text();

const parser = new DOMParser();
const doc = parser.parseFromString(html,"text/html");

const title =
doc.querySelector("h1")?.innerText || "タイトル未取得";

const firstP =
doc.querySelector("p")?.innerText || "";

let preview = firstP.substring(0,80);

if(firstP.length > 80){
preview += "...";
}

const currentUrl =
window.location.origin +
window.location.pathname.replace("index.html","") +
url;

const card = document.createElement("div");

card.className="article-card";

card.innerHTML = `
<h2><a href="${url}">${title}</a></h2>
<p>${preview}</p>

<div class="share">
<a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(currentUrl)}" target="_blank">Xで共有</a>
<a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}" target="_blank">Facebook</a>
</div>
`;

document.getElementById("articles").appendChild(card);

}catch(e){

console.warn("記事読み込み失敗:",url);

}

}

}

loadArticles();

</script>

</body>
</html>
