<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendFlash</title>

<style>
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:#f3f3f3;
  margin:0;
}

/* 黒ヘッダー復活 */
.hero{
  background:#000;
  color:#fff;
  padding:60px 20px;   /* ← バーを大きく */
  text-align:center;   /* ← 真ん中配置 */
}

.hero h1{
  margin:0;
  font-size:48px;      /* ← 大きく */
  letter-spacing:2px;
}

.date{
  margin-top:15px;
  font-size:18px;
  color:#ccc;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.article-card{
  background:#fff;
  padding:20px;
  margin-bottom:20px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>TrendFlash</h1>
  <div class="date" id="currentDate"></div>
</div>

<div class="container" id="articles"></div>

<script>
function updateDate(){
  const now = new Date();
  const formatted =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日 " +
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0') + ":" +
    now.getSeconds().toString().padStart(2,'0');  // ← 秒追加
  document.getElementById("currentDate").textContent = formatted;
}
updateDate();
setInterval(updateDate,1000);  // ← 1秒ごと更新
</script>

</body>
</html>
