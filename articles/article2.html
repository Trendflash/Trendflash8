  <p class="article-date">2026年3月1日</p>
</header>

<h2>■ 追加制裁の内容</h2>
<p>
アメリカ政府はイランに対する追加経済制裁を発表した。
金融機関やエネルギー関連企業が対象となり、
地域の軍事活動への関与が理由とされている。
</p>

<h2>■ 原油市場への影響</h2>
<p>
イランは主要な産油国の一つであり、
供給不安が高まると原油価格は上昇しやすい。
市場では投資家心理の悪化が価格変動を拡大させている。
</p>

<h2>■ 世界経済への波及</h2>
<p>
エネルギー価格の上昇は輸入国の経済を圧迫する。
インフレ再燃の可能性も指摘され、
各国は慎重な経済運営を迫られている。
</p>
